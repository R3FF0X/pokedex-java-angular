<div class="auth-container">
  <div class="auth-card">
    <h1>Pokédex</h1>
    <h2>Connexion</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Nom d'utilisateur</label>
        <input type="text" formControlName="username" placeholder="Votre username" />
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" formControlName="password" placeholder="Votre mot de passe" />
      </div>

      @if (error) {
        <p class="error">{{ error }}</p>
      }
      <button type="submit" [disabled]="loginForm.invalid">Se connecter</button>
    </form>

    <p>Pas encore de compte ? <a routerLink="/register">S'inscrire</a></p>
  </div>
</div>
