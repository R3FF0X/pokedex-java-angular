<div class="auth-container">
  <div class="auth-card">
    <h1>Pokédex</h1>
    <h2>Inscription</h2>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Nom d'utilisateur</label>
        <input type="text" formControlName="username" placeholder="Votre username" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="Votre email" />
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" formControlName="password" placeholder="6 caractères minimum" />
      </div>

      @if (error) {
        <p class="error">{{ error }}</p>
      }
      <button type="submit" [disabled]="registerForm.invalid">S'inscrire</button>
    </form>

    <p>Déjà un compte ? <a routerLink="/login">Se connecter</a></p>
  </div>
</div>
